<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Amazing Star Sports Academy</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #fff0f5;
      color: #000;
    }

    header {
      background: #d6003b;
      color: white;
      padding: 18px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    header h1 {
      font-size: 24px;
    }

    .back-btn {
      background: white;
      color: #d6003b;
      text-decoration: none;
      padding: 10px 18px;
      border-radius: 7px;
      font-weight: bold;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #ffb6c1;
      color: black;
    }

    .gallery-page {
      padding: 50px 8%;
      text-align: center;
    }

    .gallery-page h2 {
      font-size: 34px;
      color: #d6003b;
      margin-bottom: 10px;
    }

    .gallery-page p {
      margin-bottom: 30px;
      font-size: 17px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .gallery-item {
      background: #ffb6c1;
      padding: 10px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .gallery-item img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease;
      display: block;
    }

    .gallery-item img:hover {
      transform: scale(1.06);
    }

    /* Full-screen image popup */
    .image-popup {
      display: none;
      position: fixed;
      z-index: 1000;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .image-popup img {
      max-width: 92%;
      max-height: 88vh;
      border-radius: 10px;
      border: 4px solid white;
    }

    .close-popup {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 42px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      background: #d6003b;
      color: white;
      text-align: center;
      padding: 18px;
      margin-top: 40px;
    }

    @media (max-width: 1000px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 700px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .gallery-item img {
        height: 180px;
      }
    }

    @media (max-width: 450px) {
      header {
        justify-content: center;
        text-align: center;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-item img {
        height: 250px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Amazing Star Sports Academy</h1>
    <a href="index.html" class="back-btn">Back to Home</a>
  </header>

  <section class="gallery-page">
    <h2>Silambam Gallery</h2>
    <p>Click any photo to view it in full screen.</p>

    <div class="gallery-grid">
      <div class="gallery-item"><img src="G (1).jpeg" alt="Silambam Training 1"></div>
<div class="gallery-item"><img src="G (2).jpeg" alt="Silambam Training 2"></div>

<div class="gallery-item"><img src="G (4).jpeg" alt="Silambam Training 4"></div>
<div class="gallery-item"><img src="G (5).jpeg" alt="Silambam Training 5"></div>
<div class="gallery-item"><img src="G (6).jpeg" alt="Silambam Training 6"></div>
<div class="gallery-item"><img src="G (7).jpeg" alt="Silambam Training 7"></div>
<div class="gallery-item"><img src="G (8).jpeg" alt="Silambam Training 8"></div>
<div class="gallery-item"><img src="G (9).jpeg" alt="Silambam Training 9"></div>
<div class="gallery-item"><img src="G (10).jpeg" alt="Silambam Training 10"></div>
<div class="gallery-item"><img src="G (11).jpeg" alt="Silambam Training 11"></div>
<div class="gallery-item"><img src="G (12).jpeg" alt="Silambam Training 12"></div>

<div class="gallery-item"><img src="G (22).jpeg" alt="Silambam Training 22"></div>
    </div>
  </section>

  <div class="image-popup" id="imagePopup">
    <span class="close-popup" id="closePopup">&times;</span>
    <img id="popupImage" src="" alt="Full Screen Gallery Image">
  </div>

  <footer>
    <p>© 2026 Amazing Star Sports Academy | Silambam Training</p>
  </footer>

  <script>
    const images = document.querySelectorAll(".gallery-item img");
    const popup = document.getElementById("imagePopup");
    const popupImage = document.getElementById("popupImage");
    const closePopup = document.getElementById("closePopup");

    images.forEach(function (image) {
      image.addEventListener("click", function () {
        popup.style.display = "flex";
        popupImage.src = image.src;
        popupImage.alt = image.alt;
      });
    });

    closePopup.addEventListener("click", function () {
      popup.style.display = "none";
    });

    popup.addEventListener("click", function (event) {
      if (event.target === popup) {
        popup.style.display = "none";
      }
    });
  </script>

</body>
</html>
